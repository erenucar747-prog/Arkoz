<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arkoz AI Asistan — Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Poppins', sans-serif;
        background: #0a0a0a;
        color: #f0f0f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      h1 {
        color: #b8a88a;
        margin-bottom: 8px;
        font-size: 1.4rem;
      }
      p {
        color: #888;
        font-size: 0.9rem;
        margin-bottom: 24px;
      }

      #chat-box {
        width: 100%;
        max-width: 600px;
        background: #111;
        border: 1px solid #333;
        border-radius: 12px;
        overflow: hidden;
      }

      #messages {
        height: 400px;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .msg {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .msg.user {
        background: #b8a88a;
        color: #0a0a0a;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }
      .msg.ai {
        background: #1e1e1e;
        color: #f0f0f0;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
      }
      .msg.typing {
        color: #888;
        font-style: italic;
      }

      #input-area {
        display: flex;
        border-top: 1px solid #333;
        padding: 12px;
        gap: 8px;
      }
      #user-input {
        flex: 1;
        background: #1e1e1e;
        border: 1px solid #444;
        border-radius: 8px;
        color: #f0f0f0;
        padding: 10px 14px;
        font-family: 'Poppins', sans-serif;
        font-size: 0.9rem;
        outline: none;
      }
      #user-input:focus {
        border-color: #b8a88a;
      }
      #send-btn {
        background: #b8a88a;
        color: #0a0a0a;
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.9rem;
      }
      #send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #status {
        margin-top: 12px;
        font-size: 0.8rem;
        color: #666;
        text-align: center;
      }
      #status.error {
        color: #ff6b6b;
      }
      #status.ok {
        color: #6bff8e;
      }
    </style>
  </head>
  <body>
    <h1>Arkoz AI Asistan — Test</h1>
    <p>Bu sayfa Worker bağlantısını test etmek içindir.</p>

    <div id="chat-box">
      <div id="messages">
        <div class="msg ai">
          Merhaba! Ben Arkoz Gazbeton'un asistanıyım. Size nasıl yardımcı olabilirim?
        </div>
      </div>
      <div id="input-area">
        <input id="user-input" type="text" placeholder="Mesajınızı yazın..." />
        <button id="send-btn">Gönder</button>
      </div>
    </div>
    <div id="status"></div>

    <script>
      // Vercel URL'i deploy sonrası buraya yazılacak
      const params = new URLSearchParams(window.location.search);
      const WORKER_URL = params.get('api') || 'https://arkoz-ai.vercel.app/api/chat';

      const messages = document.getElementById('messages');
      const input = document.getElementById('user-input');
      const btn = document.getElementById('send-btn');
      const status = document.getElementById('status');
      const history = [];

      function addMsg(text, role) {
        const div = document.createElement('div');
        div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
      }

      async function send() {
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        btn.disabled = true;
        status.textContent = '';
        status.className = '';

        addMsg(text, 'user');
        history.push({ role: 'user', content: text });

        const typing = addMsg('Yazıyor...', 'ai');
        typing.classList.add('typing');

        try {
          const res = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: history }),
          });

          const data = await res.json();

          if (data.error) {
            typing.remove();
            status.textContent = 'Hata: ' + (data.error.message || JSON.stringify(data.error));
            status.className = 'error';
          } else {
            const reply = data.content[0].text;
            typing.textContent = reply;
            typing.classList.remove('typing');
            history.push({ role: 'assistant', content: reply });
            status.textContent = 'Bağlantı başarılı';
            status.className = 'ok';
          }
        } catch (err) {
          typing.remove();
          status.textContent = 'Bağlantı hatası: ' + err.message;
          status.className = 'error';
        }

        btn.disabled = false;
        input.focus();
      }

      btn.addEventListener('click', send);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') send();
      });
    </script>
  </body>
</html>
