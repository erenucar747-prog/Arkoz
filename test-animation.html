<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arkoz — Açılış Animasyonu Testi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a120a;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* ─── INTRO OVERLAY ─── */
    #intro {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, #0d1f0d 0%, #050a05 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #intro.fade-out { opacity: 0; pointer-events: none; }

    /* ─── TREE SVG ─── */
    #tree-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #tree-svg {
      width: 100vw;
      height: 100vh;
    }

    /* ─── GROUND GLOW ─── */
    .ground-glow {
      opacity: 0;
      transition: opacity 2s ease;
    }

    /* ─── LOGO ─── */
    #logo-wrap {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      transition: opacity 1.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #logo-wrap img {
      width: min(220px, 45vw);
      filter: brightness(0) invert(1);
      display: block;
      margin: 0 auto;
    }
    #tagline {
      margin-top: 10px;
      color: rgba(184, 168, 138, 0.85);
      font-size: clamp(10px, 1.5vw, 14px);
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ─── SKIP BUTTON ─── */
    #skip-btn {
      position: fixed;
      bottom: 28px;
      right: 32px;
      z-index: 1100;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.7);
      padding: 9px 22px;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      transition: background 0.3s, color 0.3s, opacity 0.5s;
    }
    #skip-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    #skip-btn.hidden { opacity: 0; pointer-events: none; }

    /* ─── MAIN PAGE (placeholder) ─── */
    #main-page {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.3);
      font-size: 16px;
      letter-spacing: 2px;
      font-weight: 300;
    }
  </style>
</head>
<body>

<!-- Ana sayfa arkada bekler -->
<div id="main-page">ANA SAYFA İÇERİĞİ</div>

<!-- INTRO -->
<div id="intro">
  <div id="tree-container">
    <svg id="tree-svg" viewBox="0 0 800 900" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Radial glow for leaf clusters -->
        <filter id="leaf-glow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Soft ground glow -->
        <radialGradient id="groundGrad" cx="50%" cy="100%" r="50%">
          <stop offset="0%" stop-color="#3a6e22" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#3a6e22" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- Ground glow (appears when tree greens) -->
      <ellipse class="ground-glow" id="ground-glow-el"
        cx="400" cy="875" rx="260" ry="40"
        fill="url(#groundGrad)"/>

      <!-- ══ TRUNK ══ -->
      <path id="trunk"
        d="M400 875 Q396 825 393 785 Q389 745 391 705 Q393 665 396 635"
        stroke="#5c3d22" stroke-width="24" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="310" stroke-dashoffset="310"/>

      <!-- ══ MAIN BRANCHES ══ -->
      <path id="b-l1"
        d="M393 705 Q358 675 325 650 Q292 626 262 608"
        stroke="#5c3d22" stroke-width="15" fill="none" stroke-linecap="round"
        stroke-dasharray="185" stroke-dashoffset="185"/>
      <path id="b-r1"
        d="M394 685 Q428 658 460 636 Q492 614 518 596"
        stroke="#5c3d22" stroke-width="15" fill="none" stroke-linecap="round"
        stroke-dasharray="185" stroke-dashoffset="185"/>
      <path id="b-top"
        d="M396 635 Q393 595 389 558 Q385 522 383 492"
        stroke="#5c3d22" stroke-width="11" fill="none" stroke-linecap="round"
        stroke-dasharray="155" stroke-dashoffset="155"/>

      <!-- ══ SUB-BRANCHES LEFT ══ -->
      <path id="b-l1a"
        d="M262 608 Q236 582 214 560 Q192 538 178 518"
        stroke="#6b4a2a" stroke-width="9" fill="none" stroke-linecap="round"
        stroke-dasharray="135" stroke-dashoffset="135"/>
      <path id="b-l1b"
        d="M305 638 Q285 612 268 582 Q252 555 244 530"
        stroke="#6b4a2a" stroke-width="8" fill="none" stroke-linecap="round"
        stroke-dasharray="132" stroke-dashoffset="132"/>
      <path id="b-l1c"
        d="M262 608 Q248 590 235 574 Q222 558 212 542"
        stroke="#6b4a2a" stroke-width="7" fill="none" stroke-linecap="round"
        stroke-dasharray="122" stroke-dashoffset="122"/>

      <!-- ══ SUB-BRANCHES RIGHT ══ -->
      <path id="b-r1a"
        d="M518 596 Q544 570 565 548 Q586 526 598 506"
        stroke="#6b4a2a" stroke-width="9" fill="none" stroke-linecap="round"
        stroke-dasharray="135" stroke-dashoffset="135"/>
      <path id="b-r1b"
        d="M476 622 Q498 595 518 568 Q538 542 550 516"
        stroke="#6b4a2a" stroke-width="8" fill="none" stroke-linecap="round"
        stroke-dasharray="132" stroke-dashoffset="132"/>
      <path id="b-r1c"
        d="M518 596 Q532 576 542 554 Q552 532 554 512"
        stroke="#6b4a2a" stroke-width="7" fill="none" stroke-linecap="round"
        stroke-dasharray="122" stroke-dashoffset="122"/>

      <!-- ══ TOP SUB-BRANCHES ══ -->
      <path id="b-t1a"
        d="M383 492 Q366 466 350 444 Q334 422 322 404"
        stroke="#6b4a2a" stroke-width="8" fill="none" stroke-linecap="round"
        stroke-dasharray="122" stroke-dashoffset="122"/>
      <path id="b-t1b"
        d="M383 492 Q400 466 415 442 Q430 420 438 398"
        stroke="#6b4a2a" stroke-width="8" fill="none" stroke-linecap="round"
        stroke-dasharray="122" stroke-dashoffset="122"/>
      <path id="b-t1c"
        d="M383 492 Q379 464 375 438 Q371 413 369 390"
        stroke="#6b4a2a" stroke-width="7" fill="none" stroke-linecap="round"
        stroke-dasharray="115" stroke-dashoffset="115"/>

      <!-- ══ TWIGS ══ -->
      <path id="tw1" d="M178 518 Q165 500 154 482 Q143 464 138 448"
        stroke="#7a5530" stroke-width="5" fill="none" stroke-linecap="round"
        stroke-dasharray="85" stroke-dashoffset="85"/>
      <path id="tw2" d="M178 518 Q166 504 160 490"
        stroke="#7a5530" stroke-width="4" fill="none" stroke-linecap="round"
        stroke-dasharray="55" stroke-dashoffset="55"/>
      <path id="tw3" d="M244 530 Q232 512 222 495 Q212 478 208 462"
        stroke="#7a5530" stroke-width="5" fill="none" stroke-linecap="round"
        stroke-dasharray="85" stroke-dashoffset="85"/>
      <path id="tw4" d="M212 542 Q198 525 188 510"
        stroke="#7a5530" stroke-width="4" fill="none" stroke-linecap="round"
        stroke-dasharray="58" stroke-dashoffset="58"/>
      <path id="tw5" d="M598 506 Q614 486 626 468 Q638 450 644 434"
        stroke="#7a5530" stroke-width="5" fill="none" stroke-linecap="round"
        stroke-dasharray="85" stroke-dashoffset="85"/>
      <path id="tw6" d="M598 506 Q610 490 618 474"
        stroke="#7a5530" stroke-width="4" fill="none" stroke-linecap="round"
        stroke-dasharray="55" stroke-dashoffset="55"/>
      <path id="tw7" d="M550 516 Q564 498 575 480 Q586 462 590 446"
        stroke="#7a5530" stroke-width="5" fill="none" stroke-linecap="round"
        stroke-dasharray="85" stroke-dashoffset="85"/>
      <path id="tw8" d="M554 512 Q564 495 568 478"
        stroke="#7a5530" stroke-width="4" fill="none" stroke-linecap="round"
        stroke-dasharray="58" stroke-dashoffset="58"/>
      <path id="tw9" d="M322 404 Q310 386 300 368 Q290 350 285 334"
        stroke="#7a5530" stroke-width="5" fill="none" stroke-linecap="round"
        stroke-dasharray="85" stroke-dashoffset="85"/>
      <path id="tw10" d="M322 404 Q310 388 304 372"
        stroke="#7a5530" stroke-width="4" fill="none" stroke-linecap="round"
        stroke-dasharray="58" stroke-dashoffset="58"/>
      <path id="tw11" d="M438 398 Q452 380 462 362 Q472 344 476 328"
        stroke="#7a5530" stroke-width="5" fill="none" stroke-linecap="round"
        stroke-dasharray="85" stroke-dashoffset="85"/>
      <path id="tw12" d="M438 398 Q450 382 455 366"
        stroke="#7a5530" stroke-width="4" fill="none" stroke-linecap="round"
        stroke-dasharray="58" stroke-dashoffset="58"/>
      <path id="tw13" d="M369 390 Q358 372 350 354 Q342 337 338 320"
        stroke="#7a5530" stroke-width="5" fill="none" stroke-linecap="round"
        stroke-dasharray="85" stroke-dashoffset="85"/>
      <path id="tw14" d="M369 390 Q360 374 355 358"
        stroke="#7a5530" stroke-width="4" fill="none" stroke-linecap="round"
        stroke-dasharray="55" stroke-dashoffset="55"/>

      <!-- ══ LEAF CLUSTERS (hidden, drawn by JS) ══ -->
      <g id="leaves" filter="url(#leaf-glow)"></g>

      <!-- ══ POLLEN PARTICLES (drawn by JS) ══ -->
      <g id="particles"></g>
    </svg>
  </div>

  <!-- Logo -->
  <div id="logo-wrap">
    <img src="logo.png" alt="Arkoz Gazbeton">
    <p id="tagline">Sürdürülebilir Yapı Çözümleri</p>
  </div>
</div>

<button id="skip-btn">Geç &rarr;</button>

<script>
/* ════════════════════════════════════════════
   ARKOZ — TREE INTRO ANIMATION ENGINE
   ════════════════════════════════════════════ */

'use strict';

// ── Branch draw sequence ──────────────────────
const BRANCHES = [
  { id: 'trunk',  delay:    0, dur: 1050 },
  { id: 'b-l1',  delay:  850, dur:  820 },
  { id: 'b-r1',  delay:  950, dur:  820 },
  { id: 'b-top', delay: 1100, dur:  720 },
  { id: 'b-l1a', delay: 1440, dur:  620 },
  { id: 'b-l1b', delay: 1540, dur:  620 },
  { id: 'b-l1c', delay: 1620, dur:  580 },
  { id: 'b-r1a', delay: 1440, dur:  620 },
  { id: 'b-r1b', delay: 1540, dur:  620 },
  { id: 'b-r1c', delay: 1620, dur:  580 },
  { id: 'b-t1a', delay: 1720, dur:  580 },
  { id: 'b-t1b', delay: 1800, dur:  580 },
  { id: 'b-t1c', delay: 1860, dur:  560 },
  { id: 'tw1',   delay: 2060, dur:  420 },
  { id: 'tw2',   delay: 2090, dur:  380 },
  { id: 'tw3',   delay: 2110, dur:  420 },
  { id: 'tw4',   delay: 2140, dur:  380 },
  { id: 'tw5',   delay: 2060, dur:  420 },
  { id: 'tw6',   delay: 2090, dur:  380 },
  { id: 'tw7',   delay: 2110, dur:  420 },
  { id: 'tw8',   delay: 2140, dur:  380 },
  { id: 'tw9',   delay: 2200, dur:  420 },
  { id: 'tw10',  delay: 2230, dur:  380 },
  { id: 'tw11',  delay: 2200, dur:  420 },
  { id: 'tw12',  delay: 2230, dur:  380 },
  { id: 'tw13',  delay: 2260, dur:  420 },
  { id: 'tw14',  delay: 2280, dur:  380 },
];

// ── Leaf cluster positions (twig tips) ────────
const LEAF_CLUSTERS = [
  // Left canopy
  { cx: 138, cy: 448, r: 38 }, { cx: 160, cy: 490, r: 26 },
  { cx: 208, cy: 462, r: 32 }, { cx: 188, cy: 510, r: 28 },
  { cx: 222, cy: 495, r: 30 }, { cx: 244, cy: 530, r: 30 },
  { cx: 212, cy: 542, r: 32 }, { cx: 178, cy: 518, r: 42 },
  { cx: 262, cy: 608, r: 36 },
  // Right canopy
  { cx: 644, cy: 434, r: 38 }, { cx: 618, cy: 474, r: 26 },
  { cx: 590, cy: 446, r: 32 }, { cx: 568, cy: 478, r: 28 },
  { cx: 575, cy: 480, r: 30 }, { cx: 550, cy: 516, r: 30 },
  { cx: 554, cy: 512, r: 32 }, { cx: 598, cy: 506, r: 42 },
  { cx: 518, cy: 596, r: 36 },
  // Top canopy
  { cx: 285, cy: 334, r: 34 }, { cx: 304, cy: 372, r: 26 },
  { cx: 338, cy: 320, r: 30 }, { cx: 350, cy: 354, r: 28 },
  { cx: 476, cy: 328, r: 34 }, { cx: 455, cy: 366, r: 26 },
  { cx: 369, cy: 390, r: 30 }, { cx: 355, cy: 358, r: 26 },
  { cx: 383, cy: 492, r: 40 },
  { cx: 322, cy: 404, r: 38 }, { cx: 438, cy: 398, r: 38 },
];

// ── Helpers ───────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
const rnd = (min, max) => min + Math.random() * (max - min);

function drawPath(id, delay, dur) {
  const el = document.getElementById(id);
  if (!el) return;
  const len = el.getTotalLength ? el.getTotalLength() : parseFloat(el.getAttribute('stroke-dasharray')) || 200;
  el.style.strokeDasharray = len;
  el.style.strokeDashoffset = len;
  setTimeout(() => {
    el.style.transition = `stroke-dashoffset ${dur}ms cubic-bezier(0.4, 0, 0.2, 1)`;
    el.style.strokeDashoffset = 0;
  }, delay);
}

function setColor(selector, color, delay, dur = 2200) {
  setTimeout(() => {
    document.querySelectorAll(selector).forEach(el => {
      el.style.transition = `stroke ${dur}ms cubic-bezier(0.4, 0, 0.2, 1)`;
      el.style.stroke = color;
    });
  }, delay);
}

// ── Generate leaf clusters ────────────────────
function buildLeaves() {
  const group = document.getElementById('leaves');

  LEAF_CLUSTERS.forEach(c => {
    const offsets = [
      { dx:  0,        dy:  0,        rr: 1.00 },
      { dx:  c.r*.55,  dy: -c.r*.30,  rr: 0.82 },
      { dx: -c.r*.50,  dy: -c.r*.22,  rr: 0.78 },
      { dx:  c.r*.18,  dy:  c.r*.45,  rr: 0.65 },
      { dx: -c.r*.32,  dy:  c.r*.48,  rr: 0.60 },
      { dx:  c.r*.70,  dy:  c.r*.18,  rr: 0.55 },
      { dx: -c.r*.65,  dy:  c.r*.25,  rr: 0.52 },
    ];

    offsets.forEach(o => {
      const cx = c.cx + o.dx;
      const cy = c.cy + o.dy;
      const r  = c.r  * o.rr;
      const hue = rnd(108, 138);
      const sat = rnd(55, 72);
      const lit = rnd(24, 38);

      const circle = document.createElementNS(SVG_NS, 'circle');
      circle.setAttribute('cx', cx);
      circle.setAttribute('cy', cy);
      circle.setAttribute('r',  r);
      circle.setAttribute('fill', `hsl(${hue},${sat}%,${lit}%)`);
      circle.style.transformOrigin = `${cx}px ${cy}px`;
      circle.style.transform = 'scale(0)';
      circle.style.opacity = '0.92';
      circle.dataset.cx = cx;
      circle.dataset.cy = cy;
      group.appendChild(circle);
    });
  });
}

function revealLeaves(startDelay) {
  const circles = document.querySelectorAll('#leaves circle');
  circles.forEach((c, i) => {
    const jitter = rnd(0, 200);
    setTimeout(() => {
      c.style.transition = `transform ${rnd(380, 550)}ms cubic-bezier(0.34, 1.56, 0.64, 1)`;
      c.style.transform = 'scale(1)';
    }, startDelay + i * 18 + jitter);
  });
}

// ── Floating pollen particles ─────────────────
function spawnParticles(delay) {
  const g = document.getElementById('particles');
  const count = 28;

  setTimeout(() => {
    for (let i = 0; i < count; i++) {
      const c = document.createElementNS(SVG_NS, 'circle');
      const x = rnd(180, 620);
      const y = rnd(300, 750);
      const r = rnd(1.5, 4);
      c.setAttribute('cx', x);
      c.setAttribute('cy', y);
      c.setAttribute('r',  r);
      c.setAttribute('fill', `hsl(${rnd(90,140)},60%,${rnd(55,75)}%)`);
      c.style.opacity = '0';
      g.appendChild(c);

      const driftX = rnd(-40, 40);
      const driftY = rnd(-80, -180);
      const ttl    = rnd(2800, 5200);
      const delay2 = rnd(0, 1200);

      setTimeout(() => {
        c.style.transition = `opacity 600ms ease, transform ${ttl}ms cubic-bezier(0.2,0.8,0.4,1)`;
        c.style.opacity = rnd(0.35, 0.75);
        c.style.transform = `translate(${driftX}px, ${driftY}px) scale(${rnd(0.4,1.4)})`;
        setTimeout(() => { c.style.opacity = '0'; }, ttl * 0.65);
      }, delay2);
    }
  }, delay);
}

// ── Background color pulse ─────────────────────
function pulseBackground(delay) {
  setTimeout(() => {
    document.getElementById('intro').style.transition = 'background 2.5s cubic-bezier(0.4,0,0.2,1)';
    document.getElementById('intro').style.background =
      'radial-gradient(ellipse at 50% 55%, #0e280e 0%, #060e06 75%)';
  }, delay);
}

// ── Ground glow ───────────────────────────────
function showGroundGlow(delay) {
  setTimeout(() => {
    document.getElementById('ground-glow-el').style.opacity = '1';
  }, delay);
}

// ── Logo ──────────────────────────────────────
function showLogo(delay) {
  setTimeout(() => {
    document.getElementById('logo-wrap').style.opacity = '1';
  }, delay);
}

// ── End intro ─────────────────────────────────
function endIntro() {
  const intro = document.getElementById('intro');
  const skip  = document.getElementById('skip-btn');
  intro.classList.add('fade-out');
  skip.classList.add('hidden');
  setTimeout(() => { intro.style.display = 'none'; }, 1300);
}

// ══ MAIN SEQUENCE ═════════════════════════════
function runIntro() {
  // 1. Draw all branches
  BRANCHES.forEach(b => drawPath(b.id, b.delay, b.dur));

  // 2. Branches turn alive (brown → dark green)
  setColor('#tree-svg path', '#3e5c22', 2700, 2000);

  // 3. Background deepens
  pulseBackground(2800);

  // 4. Ground glow
  showGroundGlow(2900);

  // 5. Leaves burst out
  revealLeaves(2950);

  // 6. Pollen particles float
  spawnParticles(3400);

  // 7. Logo fades in
  showLogo(4800);

  // 8. Outro — entire screen fades away
  setTimeout(endIntro, 7200);
}

// ── Skip ──────────────────────────────────────
document.getElementById('skip-btn').addEventListener('click', endIntro);

// ── Boot ──────────────────────────────────────
window.addEventListener('load', () => {
  buildLeaves();
  setTimeout(runIntro, 200);
});
</script>
</body>
</html>
